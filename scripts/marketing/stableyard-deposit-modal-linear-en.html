<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1400" />
  <title>MoveMatch · Insufficient balance modal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1400px; height: 900px; overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: #0D0F12; color: #fff; -webkit-font-smoothing: antialiased;
    }
    .nav {
      position: absolute; inset: 0 0 auto 0; height: 72px;
      display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(13,15,18,0.92);
    }
    .nav-logo { height: 28px; }
    .page { padding: 96px 32px; filter: blur(3px) brightness(0.55); }
    .overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      width: 400px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      background: #141518; box-shadow: 0 24px 80px rgba(0,0,0,0.55); position: relative; overflow: hidden;
    }
    .accent { height: 2px; background: linear-gradient(90deg, transparent, rgba(0,249,72,0.6), transparent); }
    .close { position: absolute; right: 14px; top: 14px; border: none; background: none; color: rgba(255,255,255,0.3); font-size: 18px; }
    .body { padding: 28px 24px 24px; text-align: center; }
    .alert-icon {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.55); margin: 0 auto 16px;
    }
    .title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { margin-top: 8px; font-size: 14px; color: rgba(255,255,255,0.45); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .rows { margin: 20px auto 0; max-width: 320px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 4px; text-align: left; }
    .row { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .row:last-child { border-bottom: none; }
    .row-icon {
      width: 36px; height: 36px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.45); flex-shrink: 0;
    }
    .row-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); }
    .row-desc { margin-top: 4px; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.42); }
    .cta {
      margin-top: 24px; width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #10b981, #00f948); color: #000;
      font-family: Oswald, sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase;
    }
    .cancel { margin-top: 10px; width: 100%; padding: 8px; border: none; background: none; font-size: 13px; color: rgba(255,255,255,0.38); }
    svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <nav class="nav"><img class="nav-logo" src="../../public/movematch_lockup_hires.png" alt="" /></nav>
  <div class="page"><h1 style="font-family:Oswald;font-size:32px;text-transform:uppercase;">GW 38 · Squad</h1></div>
  <div class="overlay">
    <div class="modal">
      <div class="accent"></div>
      <button type="button" class="close">×</button>
      <div class="body">
        <div class="alert-icon">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="0.75" fill="currentColor"/></svg>
        </div>
        <h2 class="title">Insufficient balance</h2>
        <p class="subtitle">Need 5.00 USDCx on Movement to register.</p>
        <div class="rows">
          <div class="row">
            <div class="row-icon">
              <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M3 12h18M12 3c2.5 2.8 3.8 6 3.8 9s-1.3 6.2-3.8 9M12 3C9.5 5.8 8.2 9 8.2 12s1.3 6.2 3.8 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <div>
              <p class="row-title">Deposit from any supported chain</p>
              <p class="row-desc">Ethereum, Solana, Base +9 chains</p>
              <p class="row-desc" style="margin-top:2px">USDCx on your Movement wallet in ~30 sec</p>
            </div>
          </div>
          <div class="row">
            <div class="row-icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M13 3L5 14h6l-1 7 9-13h-6l1-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div>
              <p class="row-title">Gas sponsored <span class="badge">+2 MOVE</span></p>
              <p class="row-desc">Will be added automatically</p>
            </div>
          </div>
        </div>
        <button type="button" class="cta">Deposit from another network</button>
        <button type="button" class="cancel">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
